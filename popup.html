<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="app-doc-title">新意二维码助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <div class="shell-sticky">
        <header class="app-head">
          <h1 class="app-title" id="app-title-heading">新意二维码助手</h1>
        </header>

        <nav class="tabs" role="tablist" aria-label="" id="tabs-nav">
          <button type="button" class="tab-btn active" role="tab" aria-selected="true" data-tab="current" data-i18n="tab_current">当前页</button>
          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-tab="decode" data-i18n="tab_decode">码转链接</button>
          <button type="button" class="tab-btn" role="tab" aria-selected="false" data-tab="encode" data-i18n="tab_encode">链接转码</button>
        </nav>
      </div>

      <div class="shell-scroll">
      <div class="panels-viewport">
          <section id="tab-current" class="tab-panel is-active" data-panel="current" data-tab-index="0" role="tabpanel">
            <div class="qr-preview-host theme-qr-bg">
              <div id="current-qr-unavailable" class="current-qr-unavailable" hidden>
                <svg class="current-qr-unavailable-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
                  <path d="M9 9l6 6M15 9l-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                </svg>
                <p class="current-qr-unavailable-title" id="current-qr-unavailable-title">当前无法获取链接</p>
                <p class="current-qr-unavailable-desc" id="current-qr-unavailable-desc"></p>
              </div>
              <canvas class="qr-preview" id="current-qr-canvas" width="220" height="220" aria-label=""></canvas>
            </div>
            <div class="btn-row">
              <button type="button" class="btn btn-primary" id="current-download" data-i18n="current_download">下载二维码</button>
              <button type="button" class="btn btn-ghost" id="current-more-styles" data-i18n="current_more_styles">更多样式</button>
            </div>
          </section>

          <section id="tab-decode" class="tab-panel" data-panel="decode" data-tab-index="1" role="tabpanel" inert>
            <div
              id="decode-drop"
              class="drop-area decode-upload-big"
              tabindex="0"
              role="region"
              aria-label=""
            >
              <input
                id="decode-file"
                class="visually-hidden"
                type="file"
                accept="image/*,video/*,.svg,.tif,.tiff,.png,.jpg,.jpeg,.gif,.bmp,.webp,.ico,.avif,.heic,.heif,.mov,.mp4,.webm,.m4v"
                tabindex="-1"
              />
              <div id="decode-upload-hero" class="decode-upload-hero">
                <span id="decode-upload-badge" class="decode-upload-badge" aria-hidden="true">
                  <svg class="decode-upload-badge-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6" />
                    <circle cx="8.5" cy="10" r="1.8" fill="currentColor" />
                    <path d="M3 17l5.5-5 4 3.5L16 12l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </span>
                <span class="decode-upload-hit-title" id="decode-hit-title">拖入图片 · 粘贴 · 点击上传</span>
                <span class="decode-upload-hit-sub muted tiny" id="decode-hit-sub">将图片拖入此区域，或在扩展窗口内按 Ctrl+V 粘贴截图；点击下方按钮从设备选择图片。</span>
                <button type="button" class="decode-file-pick-btn" id="decode-file-trigger" data-i18n="decode_pick_file">
                  选择文件
                </button>
              </div>
              <div
                id="decode-upload-compact"
                class="decode-upload-compact"
                data-compact-mode=""
                hidden
              >
                <div class="decode-compact-left">
                  <span id="decode-compact-spinner" class="decode-compact-spinner" hidden aria-hidden="true"></span>
                  <span id="decode-compact-label" class="decode-compact-label"></span>
                </div>
                <div class="decode-compact-actions">
                  <button type="button" class="decode-cancel-btn" id="decode-cancel-btn" hidden data-i18n="decode_cancel">
                    取消解析
                  </button>
                  <button type="button" class="decode-file-pick-btn decode-file-pick-btn--compact" id="decode-file-trigger-compact" data-i18n="decode_pick_file">
                    选择文件
                  </button>
                </div>
              </div>
            </div>
            <p id="decode-slow-hint" class="decode-slow-hint muted tiny" hidden role="status"></p>
            <div id="decode-preview-wrap" class="preview-wrap decode-qr-wrap" hidden>
              <div class="qr-preview-host">
                <div class="checker-frame">
                  <canvas id="decode-qr-canvas" class="qr-preview decode-qr-canvas" width="200" height="200" aria-label=""></canvas>
                </div>
              </div>
            </div>
            <div id="decode-result" class="decode-result"></div>
          </section>

          <section id="tab-encode" class="tab-panel" data-panel="encode" data-tab-index="2" role="tabpanel" inert>
            <div class="row-inline row-first">
              <span class="row-label" data-i18n="encode_label_content">内容</span>
              <input id="encode-text" class="control flex-grow" type="text" autocomplete="off" spellcheck="false" />
            </div>

            <div class="row-inline">
              <span class="row-label" data-i18n="encode_label_fg">码点</span>
              <input type="color" id="encode-fg-picker" class="color-well" value="#000000" data-i18n-attr="aria-label" data-i18n="encode_color_aria" aria-label="颜色" />
              <div class="alpha-slider-host" id="encode-fg-alpha-host" data-i18n-attr="aria-label" data-i18n="encode_alpha_aria" aria-label="透明度">
                <div class="alpha-slider-track-fill checker-bg-mini">
                  <div class="alpha-slider-visual" id="encode-fg-alpha-visual"></div>
                </div>
                <input type="range" id="encode-fg-alpha" class="alpha-range-input" min="0" max="100" value="100" />
              </div>
              <input id="encode-fg" class="control mono hex-compact" type="text" spellcheck="false" data-i18n-attr="aria-label" data-i18n="encode_hex_aria" aria-label="#代码" />
            </div>

            <div class="row-inline">
              <span class="row-label" data-i18n="encode_label_bg">背景</span>
              <input type="color" id="encode-bg-picker" class="color-well" value="#ffffff" data-i18n-attr="aria-label" data-i18n="encode_color_aria" aria-label="颜色" />
              <div class="alpha-slider-host" id="encode-bg-alpha-host" data-i18n-attr="aria-label" data-i18n="encode_alpha_aria" aria-label="透明度">
                <div class="alpha-slider-track-fill checker-bg-mini">
                  <div class="alpha-slider-visual" id="encode-bg-alpha-visual"></div>
                </div>
                <input type="range" id="encode-bg-alpha" class="alpha-range-input" min="0" max="100" value="100" />
              </div>
              <input id="encode-bg" class="control mono hex-compact" type="text" spellcheck="false" data-i18n-attr="aria-label" data-i18n="encode_hex_aria" aria-label="#代码" />
            </div>

            <div class="row-inline row-tools">
              <span class="row-label" data-i18n="encode_label_ecc">容错</span>
              <select
                id="encode-ecc"
                class="control control-inline"
                title=""
                data-ecc-title-i18n="ecc_select_title"
              >
                <option value="L" title="约可纠正 7% 以内的破损">低</option>
                <option value="M" selected title="约可纠正 15% 以内的破损，日常使用推荐">中</option>
                <option value="Q" title="约可纠正 25% 以内的破损，适合印刷或略远距离">较高</option>
                <option value="H" title="约可纠正 30% 以内的破损，适合户外或易磨损场景">最高</option>
              </select>
              <span class="row-label row-label-tight" data-i18n="encode_label_size">尺寸</span>
              <select id="encode-size" class="control control-inline">
                <option value="180">180</option>
                <option value="256" selected>256</option>
                <option value="320">320</option>
                <option value="400">400</option>
                <option value="512">512</option>
                <option value="720">720</option>
              </select>
            </div>

            <div class="encode-preview-block">
              <div class="qr-preview-host" id="encode-preview-host">
                <div class="checker-frame">
                  <canvas class="qr-preview encode-preview" width="280" height="280" aria-label="" id="encode-preview-canvas"></canvas>
                </div>
              </div>
            </div>

            <div class="split-wrap" id="split-wrap">
              <button type="button" id="split-download" class="split-main" data-i18n="dl_png">下载PNG</button>
              <button
                type="button"
                id="split-caret"
                class="split-caret"
                aria-haspopup="menu"
                aria-expanded="false"
                data-i18n-attr="aria-label"
                data-i18n="split_format_aria"
                aria-label="格式"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </section>
      </div>

      <div id="split-menu" class="split-menu split-menu-floating" role="menu" hidden>
        <button type="button" class="menu-item" role="menuitem" data-format="png">PNG</button>
        <button type="button" class="menu-item" role="menuitem" data-format="jpg">JPG</button>
        <button type="button" class="menu-item" role="menuitem" data-format="svg">SVG</button>
        <button type="button" class="menu-item" role="menuitem" data-format="svg-code" data-i18n="menu_svg_code">SVG代码</button>
      </div>

      <footer class="app-footer">
        <div class="footer-inner">
          <span class="footer-theme-slot">
            <button
              type="button"
              class="footer-link footer-theme-trigger"
              id="footer-theme"
              aria-expanded="false"
              aria-controls="theme-strip"
              aria-haspopup="true"
            >
              <span id="footer-theme-label">自适应</span><span class="theme-caret-inline" aria-hidden="true">▾</span>
            </button>
            <div id="theme-strip" class="theme-dropdown" role="menu" hidden data-footer-dropdown="theme">
              <button type="button" class="theme-dd-item" role="menuitem" data-theme-mode="auto" data-i18n="theme_auto">自适应</button>
              <button type="button" class="theme-dd-item" role="menuitem" data-theme-mode="dark" data-i18n="theme_dark">黑夜</button>
              <button type="button" class="theme-dd-item" role="menuitem" data-theme-mode="light" data-i18n="theme_light">白天</button>
            </div>
          </span>
          <span class="footer-sep">|</span>
          <span class="footer-lang-slot">
            <button
              type="button"
              class="footer-link footer-lang-trigger"
              id="footer-lang"
              aria-expanded="false"
              aria-controls="lang-strip"
              aria-haspopup="true"
            >
              <span id="footer-lang-label">语言自动</span><span class="theme-caret-inline" aria-hidden="true">▾</span>
            </button>
            <div id="lang-strip" class="theme-dropdown" role="menu" hidden data-footer-dropdown="lang">
              <button type="button" class="theme-dd-item" role="menuitem" data-locale-mode="auto" data-i18n="lang_auto">语言自动</button>
              <button type="button" class="theme-dd-item" role="menuitem" data-locale-mode="zh-CN" data-i18n="lang_zhCN">简体中文</button>
              <button type="button" class="theme-dd-item" role="menuitem" data-locale-mode="zh-TW" data-i18n="lang_zhTW">繁體中文</button>
              <button type="button" class="theme-dd-item" role="menuitem" data-locale-mode="en" data-i18n="lang_en">English</button>
            </div>
          </span>
          <span class="footer-sep">|</span>
          <button type="button" class="footer-link" id="footer-about" data-i18n="footer_about">关于</button>
        </div>
      </footer>
      </div>
    </div>

    <!-- 关于：popup 内全屏覆盖层（打开时抬高 html 上限，争取更高可视高度） -->
    <div id="about-page" class="about-page" hidden>
      <header class="about-page-head">
        <button type="button" class="about-page-back" id="about-page-back" data-i18n-attr="aria-label" data-i18n="about_back_aria" aria-label="返回">
          <svg class="about-page-back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span data-i18n="about_back">返回</span>
        </button>
        <h2 class="about-page-title" id="about-page-title-heading" data-i18n="about_page_title">关于</h2>
      </header>
      <div class="about-page-scroll">
        <div id="about-page-body" class="modal-about-host-wrap about-page-body-inner"></div>
      </div>
    </div>

    <div id="modal-lightbox" class="modal-lightbox" hidden>
      <div class="modal-card" id="modal-card">
        <button type="button" class="modal-close" id="modal-close" data-i18n-attr="aria-label" data-i18n="modal_close_aria" aria-label="关闭">
          <span class="modal-close-x" aria-hidden="true">×</span>
        </button>
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-body" id="modal-body">内容待定</div>
      </div>
    </div>

    <script src="dist/popup.js"></script>
  </body>
</html>
